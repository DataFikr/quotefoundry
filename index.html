<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuoteFoundry — Quoting software for metal fab &amp; welding job shops</title>
  <meta name="description" content="Turn a custom fab job into an accurate, branded quote in about 10 minutes — priced from your shop's own rates, not guesswork. Flat per-shop pricing, no per-user fees. Built for US metal fabrication and welding job shops." />
  <link rel="canonical" href="https://quotefoundry.app/" />
  <!-- Open Graph / Twitter — outreach links unfurl with a real preview -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="QuoteFoundry" />
  <meta property="og:title" content="QuoteFoundry — Quote fab jobs in minutes, from your own rates" />
  <meta property="og:description" content="Quoting software for metal fab & welding job shops. Your rates, deterministic math, branded PDF quotes. Flat per-shop pricing — no per-user fees." />
  <meta property="og:url" content="https://quotefoundry.app/" />
  <meta property="og:image" content="https://quotefoundry.app/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="QuoteFoundry — Quote fab jobs in minutes, from your own rates" />
  <meta name="twitter:description" content="Quoting software for metal fab & welding job shops. Flat per-shop pricing — no per-user fees." />
  <meta name="twitter:image" content="https://quotefoundry.app/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fonts: Lato (headings/numerals, 700/900 + occasional 400) + Source Sans 3
       (body/labels, 400/600/700). Weights trimmed to those actually used; the
       unused Tabler icon webfont was removed — the app uses Line Awesome only
       (Phase 4.3 network diet). -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css" />
  <!-- AEO/GEO structured data (doc 03 §4): machine-readable product + Q&A so
       answer engines (ChatGPT/Perplexity/Claude) can cite QuoteFoundry directly.
       Keep in sync with public/llms.txt and the landing copy. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "QuoteFoundry",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "url": "https://quotefoundry.app/",
    "description": "Quoting software for US metal fabrication and welding job shops (5–50 people). Turn a custom job into an accurate, branded PDF quote in about 10 minutes, priced from the shop's own stored rates through a deterministic engine — not AI guesswork. Flat per-shop pricing, no per-user fees.",
    "audience": { "@type": "Audience", "audienceType": "Metal fabrication, sheet-metal, structural-steel and welding job shops (5–50 employees)" },
    "offers": { "@type": "Offer", "category": "Founding-partner beta — free during beta; flat per-shop pricing when paid, no per-user fees" }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How much does QuoteFoundry cost?",
        "acceptedAnswer": { "@type": "Answer", "text": "It is free during the founding-partner beta. When it becomes paid, pricing is flat per shop — billed once for the shop, never per user or per seat — and founding shops keep a locked founding price. No long-term contract." }
      },
      {
        "@type": "Question",
        "name": "Does QuoteFoundry use AI to generate quotes?",
        "acceptedAnswer": { "@type": "Answer", "text": "No. Prices come from the shop's own stored rates run through a deterministic pricing engine — the same math an estimator does by hand, just faster. AI is used only to read an uploaded RFQ spreadsheet to pre-fill fields; it never sets prices." }
      },
      {
        "@type": "Question",
        "name": "Can a customer accept a quote online?",
        "acceptedAnswer": { "@type": "Answer", "text": "Yes. Every emailed quote carries a secure link. The customer opens it on a phone, sees the scope and total (never the shop's cost or margin), and taps Accept or Decline. The shop's pipeline updates automatically." }
      },
      {
        "@type": "Question",
        "name": "How is QuoteFoundry different from Paperless Parts or Xometry?",
        "acceptedAnswer": { "@type": "Answer", "text": "It is built for small shops: transparent flat per-shop pricing with no per-seat fees and no sales call, live in minutes, and it keeps the shop's own customer relationship and margin — it is not a marketplace and does not commoditize the work." }
      },
      {
        "@type": "Question",
        "name": "What kind of shops is QuoteFoundry for?",
        "acceptedAnswer": { "@type": "Answer", "text": "US metal fabrication, sheet-metal, structural-steel, and welding job shops with roughly 5–50 employees that quote custom work by hand today." }
      }
    ]
  }
  </script>
  <!-- Privacy-friendly analytics (register quotefoundry.app at plausible.io to activate; inert otherwise) -->
  <script defer data-domain="quotefoundry.app" src="https://plausible.io/js/script.js"></script>
  <!-- Google tag (gtag.js) — GA4 property G-96YYLJ20KW -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-96YYLJ20KW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // send_page_view:false — this SPA sends page_views itself (src/app/analytics.ts)
    // on each hash-route change, so GA4 records each screen as a distinct page.
    gtag('config', 'G-96YYLJ20KW', { send_page_view: false });
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
